name: Build and publish Docker image

on:
  push:
    branches:
      - main
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # Job 1: アーキテクチャごとにネイティブビルドして digest を push
  # ──────────────────────────────────────────────
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # type=gha キャッシュのエクスポートに docker-container ドライバーが必要
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # platform 名の "/" を "-" に変換してキャッシュスコープとアーティファクト名に使う
      - name: Normalize platform name
        id: normalize
        run: |
          echo "artifact=$(echo ${{ matrix.platform }} | tr '/' '-')" >> $GITHUB_OUTPUT

      # digest のみ push（タグなし）。後続の merge ジョブでマニフェストを作成する
      # cache-from/to でビルドレイヤーを GitHub Actions Cache に保存・復元する
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: >-
            type=image,
            name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},
            push-by-digest=true,
            name-canonical=true,
            push=true
          cache-from: type=gha,scope=${{ steps.normalize.outputs.artifact }}
          cache-to: type=gha,mode=max,scope=${{ steps.normalize.outputs.artifact }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ steps.normalize.outputs.artifact }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 2: 両アーキのイメージをマルチアーチマニフェストに統合して push
  # ──────────────────────────────────────────────
  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # タグとラベルを生成
      # - main への push    → :latest
      # - release v1.2.3   → :1.2.3, :1.2, :1, :latest
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      # マルチアーチマニフェストを作成して push
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect final image
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
