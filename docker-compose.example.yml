# auth-proxy — Docker Compose example (proxy mode)
#
# Usage:
#   1. Copy this file to docker-compose.yml
#   2. Replace the `app` service with your own application
#   3. Create .env.auth-proxy from .env.auth-proxy.example and fill in the values
#   4. docker compose run --rm auth-proxy init-admin
#   5. docker compose up -d

services:
  auth-proxy:
    # Choose one: either use a pre-built image or build locally
    image: ghcr.io/your-org/auth-proxy:latest    # Use pre-built image (recommended)
    # build: .                                     # Build locally from current directory
    ports:
      # Host port configurable via ${AUTH_PROXY_HOST_PORT} env var (default: 8080)
      # Point Traefik / nginx here. Never bind to 0.0.0.0 directly on public hosts.
      - "127.0.0.1:${AUTH_PROXY_HOST_PORT:-8080}:8080"
    volumes:
      - auth-proxy-data:/var/lib/auth-proxy
    env_file:
      - .env.auth-proxy
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      - app

  app:
    # Choose one: build from source, use a pre-built image, or use a public image
    build: ./my-app             # Build from ./my-app/Dockerfile
    # image: my-app:latest      # Use pre-built image
    # image: nginx:alpine       # Use public image
    # Do NOT add `ports:` here — keeping the upstream off the host is the security core.
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    # internal: true blocks all external internet access from containers on this network.
    # Remove this line only if your upstream app needs outbound internet access.
    internal: true

volumes:
  auth-proxy-data:
